name: Build and Publish Neeo Meta

on:
  # 1. Automatischer Build jede Nacht um 02:00 Uhr
  schedule:
    - cron: '0 2 1-7 * 5'
  # 2. Erlaubt es dir, den Build jederzeit manuell bei GitHub zu starten
  workflow_dispatch:
  # 3. Baut sofort neu, wenn du Änderungen am Dockerfile oder der settings.js machst
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'

env:
  REGISTRY: ghcr.io
  # Nutzt deinen GitHub-Namen/Repo-Namen als Image-Pfad
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Erzeugt das Image: ghcr.io/dein-name/my-neeo-meta:latest
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Optimierung für schnellere Builds
          cache-from: type=gha
          cache-to: type=gha,mode=max